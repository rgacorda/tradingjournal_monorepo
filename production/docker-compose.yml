# Trading Journal — production compose
# Run from: ~/production/trading-journal/
#
#   cd ~/production/trading-journal
#   docker compose -f production/docker-compose.yml up -d --build
#
# Prerequisites (run once on the server):
#   docker network create production-network
#
# Required files in ~/production/trading-journal/:
#   .env.docker   — MySQL credentials (cp .env.docker.example .env.docker)
#   .env.backend  — App secrets, JWT, CORS  (cp .env.backend.example .env.backend)
#   .env          — Build-time vars          (cp .env.compose.example .env)
#
# Nginx is managed separately in ~/production/shared/

services:
  trading-mysql:
    image: mysql:8.0
    container_name: trading-journal-mysql
    restart: unless-stopped
    env_file:
      - .env.docker
    volumes:
      - ../trading-journal-mysql-data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - production-network

  trading-journal-backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    container_name: trading-journal-backend
    restart: unless-stopped
    env_file:
      - .env.backend
    environment:
      DB_HOST: trading-mysql
      DB_PORT: "3306"
      NODE_ENV: production
    volumes:
      - ./packages/backend/uploads:/app/packages/backend/uploads
    depends_on:
      trading-mysql:
        condition: service_healthy
    networks:
      - production-network

  trading-journal-frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    container_name: trading-journal-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      - trading-journal-backend
    networks:
      - production-network

networks:
  production-network:
    external: true
