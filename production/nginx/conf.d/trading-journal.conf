# Trading Journal nginx config
# Deploy to: ~/production/nginx/conf.d/trading-journal.conf
# Replace yourdomain.com and api.yourdomain.com with your actual domains.
# After obtaining SSL certs, uncomment the HTTPS server blocks below.

# ── HTTP: Backend API ────────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.trade2learn.xyz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTP: Frontend ───────────────────────────────────────────────────────────
server {
    listen 80;
    server_name trade2learn.xyz www.trade2learn.xyz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

