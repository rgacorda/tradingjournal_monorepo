# Local development only. Production uses ~/production/docker-compose.yml
# See DEPLOYMENT.md and production/docker-compose.yml (server deploy)

services:
  mysql:
    image: mysql:8.0
    container_name: trading-journal-mysql
    restart: unless-stopped
    env_file:
      - .env.docker
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network
    ports:
      - "127.0.0.1:3306:3306"

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    container_name: trading-journal-backend
    restart: unless-stopped
    env_file:
      - .env.backend
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      NODE_ENV: production
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/packages/backend/uploads
    networks:
      - app-network
    ports:
      - "127.0.0.1:8000:8000"

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    container_name: trading-journal-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - app-network
    ports:
      - "127.0.0.1:8080:3004"

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data:
  backend_uploads:
